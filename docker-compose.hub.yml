services:
  internetx-dyndns:
    image: worryboy/internetx-dyndns:latest
    container_name: internetx-dyndns
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    tmpfs:
      - /tmp
    volumes:
      - ./state:/app/state
