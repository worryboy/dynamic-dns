name: Worker Docker Release

on:
  push:
    tags:
      - 'worker-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example worker-v0.5.6
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, Publish, and Release Worker
    runs-on: ubuntu-latest
    environment: dockerhub

    steps:
      - name: Determine release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          case "$TAG" in
            worker-v*)
              VERSION="${TAG#worker-v}"
              ;;
            *)
              echo "Tag must start with worker-v, got: $TAG" >&2
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Validate worker version
        run: |
          WORKER_VERSION="$(cat worker/VERSION)"

          if [ "$WORKER_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "worker/VERSION ($WORKER_VERSION) does not match tag version (${{ steps.version.outputs.version }})" >&2
            exit 1
          fi

      - name: Validate worker Compose files
        working-directory: worker
        run: |
          cp .env.example .env
          cp .env.dns.example .env.dns
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.hub.yml config --quiet
          docker compose -f docker-compose.traefik-crowdsec-example.yml config --quiet

      - name: Prepare GitHub release notes
        id: release_notes
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PREVIOUS_TAG="$(git tag --list 'worker-v*' --sort=-version:refname | grep -F -x -v "$CURRENT_TAG" | head -n 1 || true)"

          {
            echo "# dynamic-dns-worker v${VERSION}"
            echo
            echo "Worker release for the provider-integrated Dynamic DNS runtime."
            echo
            echo "- Version source: \`worker/VERSION\`"
            echo "- Docker image: \`worryboy/dynamic-dns-worker:${VERSION}\`"
            echo "- Release tag: \`${CURRENT_TAG}\`"
            echo "- Release line: \`worker-v*\`"
            echo

            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**Full worker-line changelog**: https://github.com/worryboy/dynamic-dns/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            else
              echo "This is the first worker-specific release tag."
            fi
          } > worker-release-notes.md

          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            worryboy/dynamic-dns-worker:${{ steps.version.outputs.version }}
            worryboy/dynamic-dns-worker:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: dynamic-dns-worker v${{ steps.version.outputs.version }}
          body_path: worker-release-notes.md
          make_latest: true
