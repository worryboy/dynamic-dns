name: Worker Docker Release

on:
  push:
    tags:
      - 'worker-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example worker-v0.5.5
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, Publish, and Release Worker
    runs-on: ubuntu-latest
    environment: dockerhub

    steps:
      - name: Determine release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          case "$TAG" in
            worker-v*)
              VERSION="${TAG#worker-v}"
              ;;
            *)
              echo "Tag must start with worker-v, got: $TAG" >&2
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Validate worker version
        run: |
          WORKER_VERSION="$(cat worker/VERSION)"

          if [ "$WORKER_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "worker/VERSION ($WORKER_VERSION) does not match tag version (${{ steps.version.outputs.version }})" >&2
            exit 1
          fi

      - name: Validate worker Compose files
        working-directory: worker
        run: |
          cp .env.example .env
          cp .env.dns.example .env.dns
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.hub.yml config --quiet
          docker compose -f docker-compose.traefik-crowdsec-example.yml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            worryboy/dynamic-dns-worker:${{ steps.version.outputs.version }}
            worryboy/dynamic-dns-worker:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
