services:
  internetx-dyndns:
    build:
      context: .
    container_name: internetx-dyndns
    image: internetx-dyndns:local
    # For RUN_ONCE=true, use: docker compose run --rm internetx-dyndns.
    # This restart policy is intended for continuous RUN_ONCE=false operation.
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    tmpfs:
      - /tmp
    volumes:
      - ./.env:/app/.env:ro
      - ./state:/app/state
    healthcheck:
      test: ["CMD", "php", "/app/bin/healthcheck.php"]
      interval: 60s
      timeout: 10s
      start_period: 120s
      retries: 3
