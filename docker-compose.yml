services:
  internetx-dyndns:
    build:
      context: .
    container_name: internetx-dyndns
    image: internetx-dyndns:local
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    tmpfs:
      - /tmp
    volumes:
      - ./.env:/app/.env:ro
      - ./state:/app/state
