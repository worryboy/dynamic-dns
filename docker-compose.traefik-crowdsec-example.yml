services:
  internetx-dyndns:
    image: worryboy/internetx-dyndns:0.5.2
    container_name: internetx-dyndns
    # For RUN_ONCE=true, validate with:
    # docker compose -f docker-compose.traefik-crowdsec-example.yml run --rm internetx-dyndns
    # This restart policy is intended for continuous RUN_ONCE=false operation.
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env.dns
    tmpfs:
      - /tmp
    volumes:
      - ./state:/app/state
    healthcheck:
      test: ["CMD", "php", "/app/bin/healthcheck.php"]
      interval: 60s
      timeout: 10s
      start_period: 120s
      retries: 3

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - internetx-dyndns
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=admin@example.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    depends_on:
      - internetx-dyndns
    environment:
      COLLECTIONS: crowdsecurity/traefik
    volumes:
      - ./crowdsec/config:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
